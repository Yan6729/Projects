# Scene 1 - Sol gris, deux cônes verts croisés, sphère rouge, cylindre bleu
camera:
{
    resolution = { width = 800; height = 800; };
    position = { x = 0; y = -20; z = -200; };
    rotation = { x = 0; y = 0; z = 0; };
    fieldOfView = 60.0;
};

primitives:
{
    spheres = (
        { x = -20; y = 60; z = 60; r = 35; color = { r = 210; g = 50; b = 50; }; }
    );

    planes = (
        { axis = "Y"; position = 100; color = { r = 160; g = 160; b = 160; }; }
    );

    cones = (
        # Cône vert gauche penché
        { x = -60; y = 40; z = 40; r = 30; height = 100; color = { r = 40; g = 180; b = 40; }; },
        # Cône vert droit penché (symétrique)
        { x = 20; y = 40; z = 40; r = 30; height = 100; color = { r = 40; g = 180; b = 40; }; }
    );

    cylinders = (
        # Cylindre bleu vertical
        { x = 60; y = 20; z = 50; r = 18; height = 120; color = { r = 60; g = 60; b = 210; }; }
    );
};

lights:
{
    ambient = 0.4;
    diffuse = 0.6;
    point = (
        { x = 1; y = -1; z = 1; intensity = 1.0; color = { r = 255; g = 40; b = 40; }; }
    );
    directional = (
        { x = 1; y = -1; z = -1; color = { r = 255; g = 255; b = 255; }; }
    );
};