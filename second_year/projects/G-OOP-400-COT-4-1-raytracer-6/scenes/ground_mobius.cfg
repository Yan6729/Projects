# ground_mobius.cfg — sous-scène importable

camera:
{
    resolution = { width = 800; height = 800; };

    position = { x = 25; y = 50; z = -200; };
    rotation = { x = 18; y = -13; z = 0; };

    fieldOfView = 45.0;
};

primitives:
{
    planes = (
        # Sol (gris)
        { axis = "Y"; position = 90;   color = { r = 160; g = 160; b = 160; }; },
        # Plafond (gris)
        { axis = "Y"; position = -120; color = { r = 160; g = 160; b = 160; }; },
        # Mur gauche — commentaire corrigé (c'était "rouge" dans le cfg mais la couleur était verte)
        { axis = "X"; position = -100; color = { r = 30;  g = 160; b = 30;  }; },
        # Mur droit — idem (commentaire disait "vert" mais couleur était rouge)
        { axis = "X"; position = 100;  color = { r = 200; g = 40;  b = 40;  }; },
        # Mur du fond (gris)
        { axis = "Z"; position = 150;  color = { r = 160; g = 160; b = 160; }; }
    );

    mobius = (
        { x = 0; y = 0; z = 0;
          R = 30.0;
          w = 10.0;
          color = { r = 255; g = 60; b = 20; }; }
    );
};

lights:
{
    ambient = 0.35;
    diffuse = 0.8;

    point = (
        { x = -40; y = -80; z = -80; intensity = 4.0; color = { r = 255; g = 240; b = 220; }; },
        { x = 80;  y = -20; z = 20;  intensity = 2.0; color = { r = 180; g = 200; b = 255; }; }
    );

    directional = (
        { x = 1; y = -1; z = 0.3; color = { r = 255; g = 255; b = 255; }; }
    );
};