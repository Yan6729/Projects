# Scene - Double hélice d'ADN
# Deux brins en spirale (sphères rouges et bleues) reliés par des barreaux (cylindres gris)
# Vue légèrement de côté, fond bleu-gris

camera:
{
    resolution = { width = 800; height = 800; };
    position = { x = 0; y = 0; z = -220; };
    rotation = { x = 0; y = 5; z = 0; };
    fieldOfView = 55.0;
};

primitives:
{
    # Fond : plan derrière la scène
    planes = (
        { axis = "Z"; position = 180; color = { r = 80; g = 120; b = 140; }; }
    );

    spheres = (
        # ── Brin 1 (bleu) + Brin 2 (rouge) sur double hélice ──
        # Chaque paire = un tour toutes les ~8 étapes (360° / 8 = 45° par step)
        # Rayon de l'hélice = 30, montée en Y de 14 par step

        # Step 0  — angle 0°   brin1:(30,0)  brin2:(-30,0)
        { x = 30;  y = -80; z = 0;   r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = -30; y = -80; z = 0;   r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 1  — angle 45°
        { x = 21;  y = -66; z = 21;  r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = -21; y = -66; z = -21; r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 2  — angle 90°
        { x = 0;   y = -52; z = 30;  r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = 0;   y = -52; z = -30; r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 3  — angle 135°
        { x = -21; y = -38; z = 21;  r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = 21;  y = -38; z = -21; r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 4  — angle 180°
        { x = -30; y = -24; z = 0;   r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = 30;  y = -24; z = 0;   r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 5  — angle 225°
        { x = -21; y = -10; z = -21; r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = 21;  y = -10; z = 21;  r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 6  — angle 270°
        { x = 0;   y = 4;   z = -30; r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = 0;   y = 4;   z = 30;  r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 7  — angle 315°
        { x = 21;  y = 18;  z = -21; r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = -21; y = 18;  z = 21;  r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 8  — angle 360° (= tour complet)
        { x = 30;  y = 32;  z = 0;   r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = -30; y = 32;  z = 0;   r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 9  — angle 45°
        { x = 21;  y = 46;  z = 21;  r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = -21; y = 46;  z = -21; r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 10 — angle 90°
        { x = 0;   y = 60;  z = 30;  r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = 0;   y = 60;  z = -30; r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 11 — angle 135°
        { x = -21; y = 74;  z = 21;  r = 10; color = { r = 60;  g = 80;  b = 220; }; },
        { x = 21;  y = 74;  z = -21; r = 10; color = { r = 220; g = 60;  b = 60;  }; },

        # Step 12 — angle 180°
        { x = -30; y = 88;  z = 0;   r = 9;  color = { r = 60;  g = 80;  b = 220; }; },
        { x = 30;  y = 88;  z = 0;   r = 9;  color = { r = 220; g = 60;  b = 60;  }; }
    );

    # Barreaux reliant les deux brins — cylindres gris horizontaux
    # Chaque barreau relie brin1[i] à brin2[i], centré entre les deux
    cylinders = (
        # Step 0  — barreau horizontal sur X (angle 0°, z=0)
        { x = 0;   y = 5; z = 65;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = -45.0; }; },

        # Step 1  — barreau diagonal (angle 45°)
        { x = 0;   y = 5; z = 52;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = 0.0; }; },

        # Step 2  — barreau sur Z (angle 90°)
        { x = 0;   y = 5; z = 38;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = -130.0; }; },

        # Step 3
        { x = 0;   y = 5; z = 25;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = -90.0; }; },

        # Step 4  — horizontal sur X
        { x = 0;   y = 7; z = 10;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = -40.0; }; },

        # Step 5
        { x = 0;   y = -5; z = -3;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = 0.0; }; },

        # Step 6  — sur Z
        { x = -80;   y = 0; z = 0;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 0.0; y = 0.0; z = 90.0; }; },

        # Step 7
        { x = 0;   y = 0;  z = -17;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = -130.0; }; },

        # Step 8  — horizontal sur X
        { x = 0;   y = 0;  z = -33;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = -90.0; }; },

        # Step 9
        { x = 0;   y = 0;  z = -45;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 90.0; y = 0.0; z = -40.0; }; },

        # Step 10 — sur Z
        { x = 0;   y = 0;  z = -60;   r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 85.0; y = 0.0; z = 0.0; }; },

        # Step 11
        { x = 72;   y = -10;  z = 20; r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = -20.0; y = 40.0; z = 105.0; }; },

        # Step 12
        { x = 90;   y = 0;  z = 0; r = 3; height = 60;
          color = { r = 200; g = 200; b = 200; };
          rotation = { x = 0.0; y = 0.0; z = 90.0; }; }
    );
};

lights:
{
    ambient = 0.35;
    diffuse = 0.75;
    directional = (
        { x = -1; y = -1; z = -1; color = { r = 255; g = 255; b = 255; }; }
    );
    point = (
        { x = 80; y = -100; z = -100; intensity = 2.0; color = { r = 255; g = 255; b = 255; }; }
    );
};