# simple_import.cfg — test d'import minimal sans mobius
# Utile si le plugin raytracer_libmobius.so n'est pas encore compilé

camera:
{
    resolution  = { width = 800; height = 800; };
    position    = { x = 0; y = 0; z = -150; };
    rotation    = { x = 0; y = 0; z = 0; };
    fieldOfView = 72.0;
};

primitives:
{
    # Une sphère locale
    spheres = (
        { x = 0; y = 0; z = -40; r = 15;
          color = { r = 255; g = 64; b = 64; }; }
    );

    # Importe les cylindres/cônes depuis d'autres fichiers
    imports = (
        "spheres.cfg",
        "cylinders_cones.cfg"
    );
};

lights:
{
    ambient = 0.4;
    diffuse = 0.6;
    point = (
        { x = 1; y = 1; z = 1; intensity = 5.0; color = { r = 255; g = 255; b = 255; }; }
    );
    directional = (
        { x = 1; y = -1; z = -1; color = { r = 255; g = 255; b = 255; }; }
    );
};
