# Tangle Cube Test Scene
camera:
{
    resolution = { width = 800; height = 800; };
    position = { x = 0; y = 0; z = -200; };
    rotation = { x = 0; y = 0; z = 0; };
    fieldOfView = 60.0;
};

primitives:
{
    tanglecubes = (
        { x = 0; y = 0; z = 0; scale = 20.0; color = { r = 100; g = 149; b = 237; }; rotation = { x = 0.0; y = 40.0; z = 20.0 }; }
    );

    planes = (
        # Sol
        { axis = "Y"; position = 90; color = { r = 40; g = 40; b = 40; }; },
        # Plafond
        { axis = "Y"; position = -120; color = { r = 60; g = 60; b = 60; }; },
        # Mur gauche
        { axis = "X"; position = -100; color = { r = 200; g = 40; b = 40; }; },
        # Mur droit
        { axis = "X"; position = 100; color = { r = 40; g = 200; b = 40; }; },
        # Mur du fond
        { axis = "Z"; position = 150; color = { r = 60; g = 60; b = 60; }; }
    );
};

lights:
{
    ambient = 0.4;
    diffuse = 0.6;
    point = (
        { x = 1; y = 1; z = -20; intensity = 2.0; color = { r = 255; g = 255; b = 255; }; },
        { x = -10; y = -1; z = 20; intensity = 2.0; color = { r = 255; g = 255; b = 255; }; }
    );
    directional = (
        { x = 120; y = 1; z = -20; color = { r = 255; g = 255; b = 255; }; }
    );
};