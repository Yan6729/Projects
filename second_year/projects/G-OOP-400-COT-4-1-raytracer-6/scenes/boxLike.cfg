# Cornell Box Scene
camera:
{
    resolution = { width = 800; height = 800; };
    position = { x = 0; y = 0; z = -200; };
    rotation = { x = 0; y = 0; z = 0; };
    fieldOfView = 60.0;
};

primitives:
{
    spheres = (
        # Sphère verte à gauche près du mur rouge
        { x = -40; y = 55; z = 60; r = 30; color = { r = 50; g = 200; b = 50; }; },
        # Petite sphère blanche au centre
        { x = 5; y = 72; z = 40; r = 18; color = { r = 200; g = 180; b = 40; }; },
        { x = 0; y = -105; z = -15; r = 10; color = { r = 255; g = 255; b = 255; }; }
    );

    planes = (
        # Sol (gris)
        { axis = "Y"; position = 90; color = { r = 40; g = 40; b = 40; }; },
        # Plafond (gris)
        { axis = "Y"; position = -120; color = { r = 60; g = 60; b = 60; }; },
        # Mur gauche (rouge)
        { axis = "X"; position = -100; color = { r = 200; g = 40; b = 40; }; },
        # Mur droit (vert)
        { axis = "X"; position = 100; color = { r = 200; g = 40; b = 40; }; },
        # Mur du fond (gris)
        { axis = "Z"; position = 150; color = { r = 200; g = 40; b = 40; }; }
    );

    cones = (
        # Cone bleu à droite près du mur vert
        { x = 0; y = -180; z = 0; r = 28; height = 80;
          color = { r = 200; g = 180; b = 40; }; },
        { x = 55; y = 10; z = 60; r = 28; height = 80; color = { r = 30; g = 60; b = 200; }; }
    );
};

lights:
{
    ambient = 0.4;
    diffuse = 0.6;
    point = (
        { x = 0; y = -50; z = 0; intensity = 2.0; color = { r = 255; g = 255; b = 255; }; }
    );
    directional = (
        { x = 1; y = -1; z = -1; color = { r = 255; g = 255; b = 255; }; }
    );
};