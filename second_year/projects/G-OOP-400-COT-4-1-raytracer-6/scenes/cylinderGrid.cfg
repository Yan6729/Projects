# Scene - Tunnel de cylindres rouges/verts avec rayons bleus diagonaux
# Vue en perspective depuis l'intérieur du tunnel, légèrement en biais

camera:
{
    resolution = { width = 800; height = 800; };
    position = { x = -60; y = -30; z = -120; };
    rotation = { x = 8; y = 25; z = 0; };
    fieldOfView = 85.0;
};

primitives:
{
    # Grille de cylindres rouges verticaux (colonnes sur X)
    cylinders = (
        { x = -60; y = 0; z = 0; r = 5; height = 300; color = { r = 220; g = 40; b = 40; }; },
        { x = -40; y = 0; z = 0; r = 5; height = 300; color = { r = 220; g = 40; b = 40; }; },
        { x = -20; y = 0; z = 0; r = 5; height = 300; color = { r = 220; g = 40; b = 40; }; },
        { x = 0;   y = 0; z = 0; r = 5; height = 300; color = { r = 220; g = 40; b = 40; }; },
        { x = 20;  y = 0; z = 0; r = 5; height = 300; color = { r = 220; g = 40; b = 40; }; },
        { x = 40;  y = 0; z = 0; r = 5; height = 300; color = { r = 220; g = 40; b = 40; }; },
        { x = 60;  y = 0; z = 0; r = 5; height = 300; color = { r = 220; g = 40; b = 40; }; },
        { x = 80;  y = 0; z = 0; r = 5; height = 300; color = { r = 220; g = 40; b = 40; }; },

        # Grille de cylindres verts horizontaux (rangées sur Z)
        { x = 0; y = 0; z = -60; r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = -40; r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = -20; r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = 0;   r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = 20;  r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = 40;  r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = 60;  r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = 80;  r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = 100; r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },
        { x = 0; y = 0; z = 120; r = 5; height = 300; color = { r = 40; g = 200; b = 40; }; },

        # Rayons bleus diagonaux traversant le tunnel
        { x = -55; y = -40; z = -50; r = 7; height = 280;
          color = { r = 60; g = 80; b = 230; };
          rotation = { x = 30.0; y = 0.0; z = 45.0; }; },
        { x = -30; y = -20; z = -20; r = 7; height = 280;
          color = { r = 60; g = 80; b = 230; };
          rotation = { x = 25.0; y = 0.0; z = 40.0; }; },
        { x = -5;  y = 0;   z = 10;  r = 7; height = 280;
          color = { r = 60; g = 80; b = 230; };
          rotation = { x = 20.0; y = 0.0; z = 35.0; }; },
        { x = 20;  y = 20;  z = 40;  r = 7; height = 280;
          color = { r = 60; g = 80; b = 230; };
          rotation = { x = 15.0; y = 0.0; z = 30.0; }; },
        { x = 45;  y = 35;  z = 70;  r = 7; height = 280;
          color = { r = 60; g = 80; b = 230; };
          rotation = { x = 10.0; y = 0.0; z = 25.0; }; }
    );
};

lights:
{
    ambient = 0.25;
    diffuse = 0.8;
    directional = (
        { x = 1; y = -1; z = 1; intensity = 5.0; color = { r = 255; g = 255; b = 255; }; }
    );
    point = (
        { x = -30; y = -80; z = 30; color = { r = 255; g = 255; b = 255; }; }
    );
};